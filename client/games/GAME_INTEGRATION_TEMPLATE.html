/**
 * ML Game Integration Template HTML
 * Use this template for all game HTML files to integrate with ML system
 * Copy and modify for each game
 */

<!-- TEMPLATE FOR: [GAME_NAME] Game with ML Integration -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[GAME_NAME] - Focus Frontier</title>
  
  <!-- Base Styles -->
  <link rel="stylesheet" href="../../assets/style.css">
  
  <!-- ML Game Styles -->
  <link rel="stylesheet" href="../../assets/game-styles.css">
  
  <!-- ML Widget Styles -->
  <link rel="stylesheet" href="../../assets/ml-styles.css">
  
  <style>
    /* Game-specific overrides (optional) */
    #game-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
  </style>
</head>
<body class="game-view">
  <header class="navbar">
    <div class="navbar-content">
      <h1>Focus Frontier</h1>
      <nav>
        <a href="../../index.html">Home</a>
        <a href="../index.html">Games</a>
        <a href="../analytics.html">Analytics</a>
        <a href="#" id="logout">Logout</a>
      </nav>
    </div>
  </header>

  <main>
    <div id="game-container"></div>
  </main>

  <!-- Game Engine Base Class (Required) -->
  <script src="../../assets/game-engine-ml.js"></script>
  
  <!-- ML Client (Required for API communication) -->
  <script src="../../assets/ml-client.js"></script>
  
  <!-- Game-Specific Implementation -->
  <script src="./[GAME_NAME]-ml.js"></script>
  <!-- Example files:
    - memory-matrix-ml.js
    - focus-sphere-ml.js
    - pattern-path-ml.js
    - reflex-runner-ml.js
    - color-cascade-ml.js
    - shape-sorter-ml.js
  -->

  <script>
    // Auto-initialize game on page load
    document.addEventListener('DOMContentLoaded', () => {
      // Game initialization happens in the game-specific file
      console.log('Game page loaded and ready');
    });

    // Handle logout
    document.getElementById('logout')?.addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('token');
      window.location.href = '../../index.html';
    });
  </script>
</body>
</html>

   - Game should auto-initialize on page load
   - ML recommendations should load
   - Difficulty adjustment should work

   - Check browser console for API calls
   - Verify session creation on game start
   - Verify metrics saved on game end

   - Update games/index.html to link to new ML game
   - Update game descriptions if needed

===========================

- Container must have proper grid styling

- Canvas will be sized automatically
- Load from: focus-sphere-ml.js

Pattern Path:

- Requires timer display support
- Load from: pattern-path-ml.js

Reflex Runner:

- Load from: reflex-runner-ml.js

Color Cascade:
