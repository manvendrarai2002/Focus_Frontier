<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reflex Runner</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <style>
    #runner { position:absolute; bottom:24px; left:40px; width:48px; height:48px; border-radius:12px; background:#34d399; transition:transform 0.3s ease; }
    #obstacle { position:absolute; bottom:24px; right:-80px; width:46px; height:46px; border-radius:10px; background:#f43f5e; box-shadow:0 4px 12px rgba(244,63,94,0.6); }
    .ground { position:absolute; bottom:0; left:0; width:100%; height:4px; background:linear-gradient(90deg, #38bdf8, #a855f7); }
    @keyframes flash { 0%, 100% { opacity:1; } 50% { opacity:0.5; } }
    
    /* Countdown overlay */
    .countdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeIn 0.3s ease;
    }
    
    .countdown-number {
      font-size: 150px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 40px rgba(56, 189, 248, 0.8), 0 0 80px rgba(56, 189, 248, 0.4);
      animation: countdownPulse 0.8s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes countdownPulse {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* Game window */
    .game-window {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0f1e;
      z-index: 9999;
      display: none;
      animation: slideIn 0.4s ease;
    }
    
    .game-window.active {
      display: block;
    }
    
    @keyframes slideIn {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <div class="navbar">
      <div class="brand"><span class="tag">Game</span><a href="../index.html">Focus Frontier</a> / Reflex Runner</div>
      <div class="badges" id="user-chip"></div>
    </div>
  </header>
  <main id="main-menu">
    <div class="section-title"><h2>Reflex Runner</h2><div class="badges"><span class="badge">Attention</span><span class="badge">Inhibition</span><span class="badge" id="high-score">Best: 0</span></div></div>
    <div class="split">
      <div class="panel">
        <div class="stat-line"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat-line"><span>Time</span><strong id="time">∞</strong></div>
        <div class="stat-line"><span>Streak</span><strong id="streak">0</strong></div>
        <div class="stat-line"><span>Speed</span><strong id="speed">1.8x</strong></div>
        <div class="stat-line"><span>Mode</span>
          <select id="mode" aria-label="Mode" style="padding:6px 10px;border-radius:8px;background:#0f182b;color:var(--text);border:1px solid rgba(255,255,255,0.08)">
            <option value="timed">Timed</option>
            <option value="elimination">Elimination</option>
          </select>
        </div>
        <div class="stat-line" id="time-row"><span>Time limit</span>
          <select id="time-limit" aria-label="Time limit" style="padding:6px 10px;border-radius:8px;background:#0f182b;color:var(--text);border:1px solid rgba(255,255,255,0.08)">
            <option value="30">30s</option>
            <option value="60" selected>60s</option>
            <option value="90">90s</option>
            <option value="120">120s</option>
            <option value="180">180s</option>
          </select>
        </div>
        <div class="stat-line"><span>Difficulty</span>
          <select id="difficulty" style="padding:6px 10px;border-radius:8px;background:#0f182b;color:var(--text);border:1px solid rgba(255,255,255,0.08)">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <div style="display:flex; gap:10px; margin-top:14px;">
          <button class="btn" id="start">Play</button>
          <button class="btn secondary" id="help">Tutorial</button>
          <button class="btn secondary" onclick="window.location='/client/index.html'">Back</button>
        </div>
        <div style="margin-top:12px;">
          <button class="btn secondary" id="sound-toggle" style="width:100%">🔊 Sound ON</button>
        </div>
        <div style="margin-top:12px; padding:12px; background:rgba(56,189,248,0.1); border-radius:10px; font-size:13px;">
          💡 <strong>Controls:</strong> Click screen or press SPACE to jump!
        </div>
      </div>
      <div class="game-stage" id="stage" style="overflow:hidden;">
        <div id="runner"></div>
        <div id="obstacle"></div>
        <div class="ground"></div>
      </div>
    </div>
  </main>

  <!-- Game Window -->
  <div class="game-window" id="game-window">
    <div style="padding: 20px; height: 100%; display: flex; flex-direction: column;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0; color: #fff; font-size: 24px;">Reflex Runner</h2>
        <div style="display: flex; gap: 20px; align-items: center;">
          <div style="color: #38bdf8; font-weight: 600;">Score: <span id="game-score">0</span></div>
          <div style="color: #a855f7; font-weight: 600;">Streak: <span id="game-streak">0</span></div>
          <div style="color: #f59e0b; font-weight: 600;">Speed: <span id="game-speed">1.8x</span></div>
          <div style="color: #10b981; font-weight: 600;">Time: <span id="game-time">∞</span></div>
          <button class="btn secondary" id="pause-game">Pause</button>
          <button class="btn secondary" id="quit-game">Quit</button>
        </div>
      </div>
      <div class="game-stage" id="game-stage" style="flex: 1; overflow: hidden; position: relative;">
        <div id="game-runner" style="position:absolute; bottom:24px; left:40px; width:48px; height:48px; border-radius:12px; background:#34d399; transition:transform 0.3s ease;"></div>
        <div id="game-obstacle" style="position:absolute; bottom:24px; right:-80px; width:46px; height:46px; border-radius:10px; background:#f43f5e; box-shadow:0 4px 12px rgba(244,63,94,0.6);"></div>
        <div class="ground"></div>
      </div>
    </div>
  </div>

  <script src="../assets/app.js"></script>
  <script src="../assets/game-utils.js"></script>
  <script src="../assets/ml-client.js"></script>
  <script>
    renderUserChip('#user-chip');
    const runner = document.getElementById('runner');
    const obstacle = document.getElementById('obstacle');
    const stage = document.getElementById('stage');
    const scoreEl = document.getElementById('score');
    const streakEl = document.getElementById('streak');
    const speedEl = document.getElementById('speed');
    const diffEl = document.getElementById('difficulty');
    const modeEl = document.getElementById('mode');
    const timeLimitEl = document.getElementById('time-limit');
    const timeRow = document.getElementById('time-row');
    const timeEl = document.getElementById('time');
    const highScoreEl = document.getElementById('high-score');

    // Game window elements
    const gameWindow = document.getElementById('game-window');
    const gameRunner = document.getElementById('game-runner');
    const gameObstacle = document.getElementById('game-obstacle');
    const gameStage = document.getElementById('game-stage');
    const gameScoreEl = document.getElementById('game-score');
    const gameStreakEl = document.getElementById('game-streak');
    const gameSpeedEl = document.getElementById('game-speed');
    const gameTimeEl = document.getElementById('game-time');

    const sound = new GameUtils.SoundManager();
    const stats = new GameUtils.GameStats('reflexRunner');
    const tracker = new GameUtils.PerformanceTracker();
    const mlClient = new MLClient();

    let sessionId = null;
    let score = 0;
    let streak = 0;
    let speed = 1.8;
    let raf = null;
    let paused = false;
    let jump = false;
    let gameActive = false;
    let totalTimer = null;
    let ended = false;

    highScoreEl.textContent = `Best: ${stats.stats.highScore}`;

    const tutorial = new GameUtils.Tutorial([
      { title: 'Welcome to Reflex Runner!', content: 'Jump over obstacles to score points. The game speeds up as you progress!' },
      { title: 'Controls', content: 'Click anywhere on the game area or press SPACE to jump. Timing is everything!' },
      { title: 'Scoring', content: 'Earn 1 point per obstacle avoided. Build streaks for bonus celebrations!' }
    ], 'tutorial_reflexRunner');

    document.getElementById('help').addEventListener('click', () => {
      tutorial.shown = false;
      tutorial.show();
    });

    document.getElementById('sound-toggle').addEventListener('click', (e) => {
      const enabled = sound.toggle();
      e.target.textContent = enabled ? '🔊 Sound ON' : '🔇 Sound OFF';
    });

    function syncModeUI() {
      const timed = modeEl.value === 'timed';
      timeRow.style.display = timed ? 'flex' : 'none';
      timeEl.textContent = timed ? timeLimitEl.value : '∞';
    }

    function showCountdown() {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'countdown-overlay';
        document.body.appendChild(overlay);

        let count = 3;
        
        function updateCountdown() {
          overlay.innerHTML = `<div class="countdown-number">${count}</div>`;
          sound.click();
          
          if (count > 1) {
            count--;
            setTimeout(updateCountdown, 1000);
          } else {
            setTimeout(() => {
              overlay.innerHTML = '<div class="countdown-number" style="color: #34d399;">GO!</div>';
              sound.success();
              setTimeout(() => {
                overlay.remove();
                resolve();
              }, 800);
            }, 1000);
          }
        }
        
        updateCountdown();
      });
    }

    function openGameWindow() {
      gameWindow.classList.add('active');
      document.getElementById('main-menu').style.display = 'none';
    }

    function closeGameWindow() {
      gameWindow.classList.remove('active');
      document.getElementById('main-menu').style.display = 'block';
      // Update main menu score display
      scoreEl.textContent = score;
      streakEl.textContent = streak;
      speedEl.textContent = speed.toFixed(1) + 'x';
    }

    function startTotalTimer() {
      clearInterval(totalTimer);
      if (modeEl.value !== 'timed') {
        gameTimeEl.textContent = '∞';
        return;
      }
      let t = parseInt(timeLimitEl.value, 10);
      gameTimeEl.textContent = t;
      totalTimer = setInterval(async () => {
        if (paused || ended) return;
        t -= 1;
        gameTimeEl.textContent = t;
        if (t <= 0) await endGame('Time up');
      }, 1000);
    }

    function resetObstacle() {
      gameObstacle.style.right = '-60px';
      gameObstacle.dataset.x = gameStage.clientWidth + 60;
    }

    async function startGame() {
      if (tutorial.shouldShow()) {
        tutorial.show(() => startGame());
        return;
      }

      // Load ML difficulty recommendation
      const mlRecommendation = await mlClient.getDifficultyRecommendation('reflexRunner');
      if (mlRecommendation?.autoAdjust) {
        diffEl.value = mlRecommendation.suggestedDifficulty;
      }
      if (mlRecommendation) {
        mlClient.displayDifficultyWidget('difficulty-widget-reflex', mlRecommendation);
      }

      // Show countdown
      await showCountdown();
      
      // Open game window
      openGameWindow();
      
      paused = false;
      gameActive = true;
      ended = false;
      score = 0;
      streak = 0;
      speed = diffEl.value === 'advanced' ? 2.4 : diffEl.value === 'intermediate' ? 2.0 : 1.8;
      gameSpeedEl.textContent = speed.toFixed(1) + 'x';
      gameScoreEl.textContent = '0';
      gameStreakEl.textContent = '0';
      resetObstacle();
      sessionId = await startSession('reflexRunner', diffEl.value);
      tracker.track('game_started');
      startTotalTimer();
      raf && cancelAnimationFrame(raf);
      raf = requestAnimationFrame(tick);
    }

    function collision() {
      const r = gameRunner.getBoundingClientRect();
      const o = gameObstacle.getBoundingClientRect();
      const overlap = !(r.right < o.left || r.left > o.right || r.bottom < o.top || r.top > o.bottom);
      return overlap && !jump;
    }

    async function tick() {
      if (!paused && gameActive) {
        const x = parseFloat(gameObstacle.dataset.x || gameStage.clientWidth + 60) - speed * 4;
        gameObstacle.dataset.x = x;
        gameObstacle.style.right = (gameStage.clientWidth - x) + 'px';

        if (collision()) {
          if (modeEl.value === 'elimination') {
            await endGame('Collision');
            return;
          }
          // Timed mode: collision penalizes and continues
          score = Math.max(0, score - 2);
          streak = 0;
          gameScoreEl.textContent = score;
          gameStreakEl.textContent = streak;
          sound.error();
          GameUtils.VisualFeedback.shake(gameStage, 6);
        }

        if (x < -80) {
          score += 1;
          streak += 1;
          gameScoreEl.textContent = score;
          gameStreakEl.textContent = streak;
          sound.success();
          
          // Celebrate streaks
          if (streak > 0 && streak % 10 === 0) {
            toast(`🔥 ${streak} Streak!`, 'info');
          }
          
          speed = Math.min(speed + 0.02, 3.5);
          gameSpeedEl.textContent = speed.toFixed(1) + 'x';
          resetObstacle();
          tracker.track('obstacle_cleared', { score, streak });
          await recordMetrics(sessionId, [{ name: 'score', value: score, skill: 'attention', difficulty: diffEl.value }], false);
        }
      }
      raf = requestAnimationFrame(tick);
    }

    async function endGame(reason) {
      if (ended) return;
      ended = true;
      gameActive = false;
      clearInterval(totalTimer);
      sound.error();
      GameUtils.VisualFeedback.shake(gameStage, 10);
      const isHighScore = stats.update(score, streak);
      if (isHighScore && score > 0) {
        showHighScoreBanner(score);
        highScoreEl.textContent = `Best: ${score}`;
      }
      toast(`Game Over! Score: ${score}`, 'error');
      await recordMetrics(sessionId, [{ name: 'score', value: score, skill: 'inhibition', difficulty: diffEl.value }], true);
      tracker.track('game_ended', { score, reason });
      
      // Send session data to ML for analysis
      await mlClient.analyzeSessionComplete({
        gameKey: 'reflexRunner',
        duration: tracker.getTotalTime?.() || 0,
        score: score,
        metrics: [
          { name: 'score', value: score },
          { name: 'streak', value: streak },
          { name: 'difficulty', value: diffEl.value }
        ]
      });
      
      // Wait a moment then close game window
      setTimeout(() => {
        closeGameWindow();
      }, 2000);
    }

    function doJump() {
      if (jump || paused || !gameActive) return;
      jump = true;
      sound.click();
      gameRunner.style.transition = 'transform 0.28s ease-out';
      gameRunner.style.transform = 'translateY(-120px)';
      tracker.track('jump', { score });
      setTimeout(() => {
        gameRunner.style.transform = 'translateY(0)';
        setTimeout(() => { jump = false; }, 200);
      }, 300);
    }

    function showHighScoreBanner(score) {
      const banner = document.createElement('div');
      banner.className = 'high-score-banner';
      banner.style.cssText = `
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px 50px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        z-index: 999; animation: popIn 0.5s ease forwards;
      `;
      banner.innerHTML = `
        <h2 style="margin:0; font-size:32px; color:#fff;">🏆 NEW HIGH SCORE!</h2>
        <p style="margin:10px 0 0; font-size:48px; font-weight:800; color:#fbbf24;">${score} Points</p>
      `;
      document.body.appendChild(banner);
      sound.win();
      setTimeout(() => banner.remove(), 3000);
    }

    document.getElementById('start').addEventListener('click', startGame);
    
    document.getElementById('pause-game').addEventListener('click', () => { 
      paused = !paused; 
      document.getElementById('pause-game').textContent = paused ? 'Resume' : 'Pause';
      tracker.track(paused ? 'paused' : 'resumed');
      if (paused && sessionId) recordMetrics(sessionId, [{ name: 'score', value: score, skill: 'attention', difficulty: diffEl.value }], false);
    });

    document.getElementById('quit-game').addEventListener('click', async () => {
      if (confirm('Are you sure you want to quit? Your progress will be saved.')) {
        await endGame('Player quit');
        closeGameWindow();
      }
    });
    
    modeEl.addEventListener('change', syncModeUI);
    timeLimitEl.addEventListener('change', syncModeUI);
    syncModeUI();
    
    gameStage.addEventListener('click', doJump);
    window.addEventListener('keydown', (e) => { if (e.code === 'Space' && gameActive) { e.preventDefault(); doJump(); } });
    window.addEventListener('beforeunload', () => { 
      if (sessionId) recordMetrics(sessionId, [{ name: 'score', value: score, skill: 'attention', difficulty: diffEl.value }], true);
    });
  </script>
</body>
</html>
