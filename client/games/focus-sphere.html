<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Sphere</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <style>
    /* Immersive game styles */
    .immersive-mode header,
    .immersive-mode .section-title,
    .immersive-mode .panel {
      display: none !important;
    }
    
    .immersive-mode main {
      padding: 0 !important;
      max-width: 100% !important;
    }
    
    .immersive-mode .split {
      grid-template-columns: 1fr !important;
      gap: 0 !important;
    }
    
    .immersive-mode .game-stage {
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
    }
    
    /* HUD overlay for game stats during play */
    #game-hud {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none;
      gap: 30px;
      background: rgba(15, 24, 43, 0.85);
      backdrop-filter: blur(10px);
      padding: 15px 40px;
      border-radius: 16px;
      border: 1px solid rgba(125, 211, 252, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    
    .immersive-mode #game-hud {
      display: flex;
    }
    
    .hud-stat {
      text-align: center;
    }
    
    .hud-stat .label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .hud-stat .value {
      font-size: 24px;
      font-weight: 700;
      color: #7dd3fc;
    }
    
    /* Results modal */
    #results-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    
    #results-modal.show {
      display: flex;
    }
    
    .results-content {
      background: linear-gradient(135deg, #0f182b 0%, #1a2847 100%);
      padding: 40px 50px;
      border-radius: 24px;
      border: 2px solid rgba(125, 211, 252, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      text-align: center;
      max-width: 500px;
      animation: slideUp 0.4s ease;
    }
    
    .results-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .results-subtitle {
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .results-score {
      font-size: 72px;
      font-weight: 800;
      color: #7dd3fc;
      margin: 20px 0;
      text-shadow: 0 0 30px rgba(125, 211, 252, 0.5);
    }
    
    .results-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }
    
    .result-stat {
      background: rgba(125, 211, 252, 0.1);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(125, 211, 252, 0.2);
    }
    
    .result-stat .label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    
    .result-stat .value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    
    .results-actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }
    
    .results-actions .btn {
      flex: 1;
    }
    
    .new-best {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 50px;
      background: linear-gradient(135deg, #fbbf24, #fde047);
      color: #78350f;
      font-weight: 600;
      font-size: 14px;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .results-actions button {
      flex: 1;
    }

    .hit-pop {
      animation: hitPop 0.18s ease-out;
      filter: drop-shadow(0 0 18px rgba(125, 211, 252, 0.9));
    }

    @keyframes hitPop {
      0% { transform: scale(1); box-shadow: 0 10px 18px rgba(56,189,248,0.4); }
      50% { transform: scale(1.18); box-shadow: 0 0 28px rgba(125, 211, 252, 0.9); }
      100% { transform: scale(1); box-shadow: 0 10px 18px rgba(56,189,248,0.4); }
    }

    /* Visual polish */
    body {
      background: radial-gradient(1200px 800px at 20% -10%, rgba(56,189,248,0.18), transparent),
                  radial-gradient(900px 600px at 110% 10%, rgba(168,85,247,0.18), transparent),
                  #0a0f1f;
    }

    #stage {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(600px 400px at 20% 20%, rgba(125,211,252,0.08), transparent 60%),
        radial-gradient(700px 500px at 80% 80%, rgba(56,189,248,0.08), transparent 60%),
        linear-gradient(180deg, rgba(9,15,30,0.98), rgba(9,15,30,0.9));
      border: 1px solid rgba(125, 211, 252, 0.15);
      box-shadow: inset 0 0 80px rgba(0,0,0,0.55), 0 20px 60px rgba(0,0,0,0.35);
    }

    #stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(125,211,252,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(125,211,252,0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.25;
      pointer-events: none;
    }

    #stage::after {
      content: "";
      position: absolute;
      inset: -20px;
      background: radial-gradient(800px 500px at center, transparent 40%, rgba(0,0,0,0.6) 70%);
      pointer-events: none;
    }

    #target {
      animation: idlePulse 2.4s ease-in-out infinite;
      box-shadow: 0 0 24px rgba(125,211,252,0.6), 0 12px 24px rgba(56,189,248,0.35);
      border: 2px solid rgba(255,255,255,0.15);
    }

    @keyframes idlePulse {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Countdown overlay */
    .countdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeIn 0.3s ease;
    }
    
    .countdown-number {
      font-size: 150px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 40px rgba(125, 211, 252, 0.8), 0 0 80px rgba(125, 211, 252, 0.4);
      animation: countdownPulse 0.8s ease;
    }
    
    @keyframes countdownPulse {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* Game window */
    .game-window {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0f1e;
      z-index: 9999;
      display: none;
      animation: slideInWindow 0.4s ease;
    }
    
    .game-window.active {
      display: flex;
      flex-direction: column;
    }
    
    @keyframes slideInWindow {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <div class="navbar">
      <div class="brand"><span class="tag">Game</span><a href="../index.html">Focus Frontier</a> / Focus Sphere</div>
      <div class="badges" id="user-chip"></div>
    </div>
  </header>
  <main id="main-menu">
    <div class="section-title"><h2>Focus Sphere</h2><div class="badges"><span class="badge">Attention</span><span class="badge">Processing speed</span></div></div>
    <div class="split">
      <div class="panel">
        <div class="stat-line"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat-line"><span>Time</span><strong id="time">∞</strong></div>
        <div class="stat-line"><span>Hits</span><strong id="hits">0</strong></div>
        <div class="stat-line"><span>Miss window (ms)</span><strong id="interval">1200</strong></div>
        <div class="stat-line"><span>Mode</span>
          <select id="mode" aria-label="Mode" style="padding:6px 10px;border-radius:8px;background:#0f182b;color:var(--text);border:1px solid rgba(255,255,255,0.08)">
            <option value="timed">Timed</option>
            <option value="elimination">Elimination</option>
          </select>
        </div>
        <div class="stat-line" id="time-row"><span>Time limit</span>
          <select id="time-limit" aria-label="Time limit" style="padding:6px 10px;border-radius:8px;background:#0f182b;color:var(--text);border:1px solid rgba(255,255,255,0.08)">
            <option value="30">30s</option>
            <option value="60" selected>60s</option>
            <option value="90">90s</option>
            <option value="120">120s</option>
            <option value="180">180s</option>
          </select>
        </div>
        <div class="stat-line"><span>Difficulty</span>
          <select id="difficulty" aria-label="Difficulty" style="padding:6px 10px;border-radius:8px;background:#0f182b;color:var(--text);border:1px solid rgba(255,255,255,0.08)">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <div style="display:flex; gap:10px; margin-top:14px;">
          <button class="btn" id="start">Play</button>
          <button class="btn secondary" onclick="window.location='../index.html'">Back to Hub</button>
        </div>
      </div>
      <div class="game-stage" id="stage">
        <div id="target" style="position:absolute;width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,#7dd3fc,#38bdf8);border:2px solid #0b1220;box-shadow:0 10px 18px rgba(56,189,248,0.4);display:none;"></div>
      </div>
    </div>
  </main>
  
  <!-- Game Window -->
  <div class="game-window" id="game-window">
    <div style="padding: 20px; height: 100%; display: flex; flex-direction: column;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0; color: #fff; font-size: 24px;">Focus Sphere</h2>
        <div style="display: flex; gap: 20px; align-items: center;">
          <div style="color: #fbbf24; font-weight: 600;">Score: <span id="game-score">0</span></div>
          <div style="color: #38bdf8; font-weight: 600;">Hits: <span id="game-hits">0</span></div>
          <div style="color: #a855f7; font-weight: 600;">Speed: <span id="game-speed">1200ms</span></div>
          <div style="color: #10b981; font-weight: 600;">Time: <span id="game-time">∞</span></div>
          <button class="btn secondary" id="quit-game">Quit</button>
        </div>
      </div>
      <div id="game-stage" style="flex: 1; position: relative; overflow: hidden; background: radial-gradient(600px 400px at 20% 20%, rgba(125,211,252,0.08), transparent 60%), radial-gradient(700px 500px at 80% 80%, rgba(56,189,248,0.08), transparent 60%), linear-gradient(180deg, rgba(9,15,30,0.98), rgba(9,15,30,0.9)); border: 1px solid rgba(125, 211, 252, 0.15); box-shadow: inset 0 0 80px rgba(0,0,0,0.55), 0 20px 60px rgba(0,0,0,0.35); border-radius: 16px;">
        <div id="game-target" style="position:absolute;width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,#7dd3fc,#38bdf8);border:2px solid #0b1220;box-shadow:0 10px 18px rgba(56,189,248,0.4);display:none;animation:idlePulse 2.4s ease-in-out infinite;"></div>
      </div>
    </div>
  </div>



  <script src="../assets/app.js"></script>
  <script src="../assets/game-utils.js"></script>
  <script src="../assets/ml-client.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="../assets/multiplayer-game.js"></script>
  <script>
    renderUserChip('#user-chip');
    const stage = document.getElementById('stage');
    const target = document.getElementById('target');
    const scoreEl = document.getElementById('score');
    const hitsEl = document.getElementById('hits');
    const intervalEl = document.getElementById('interval');
    const diffEl = document.getElementById('difficulty');
    const modeEl = document.getElementById('mode');
    const timeLimitEl = document.getElementById('time-limit');
    const timeRow = document.getElementById('time-row');
    const timeEl = document.getElementById('time');
    
    // Game window elements
    const gameWindow = document.getElementById('game-window');
    const gameStage = document.getElementById('game-stage');
    const gameTarget = document.getElementById('game-target');
    const gameScoreEl = document.getElementById('game-score');
    const gameHitsEl = document.getElementById('game-hits');
    const gameSpeedEl = document.getElementById('game-speed');
    const gameTimeEl = document.getElementById('game-time');
    
    const sound = new GameUtils.SoundManager();
    const stats = new GameUtils.GameStats('focusSphere');
    const tracker = new GameUtils.PerformanceTracker();
    const mlClient = new MLClient();

    let sessionId = null;
    let score = 0;
    let misses = 0;
    let progressivePenalty = 0;
    let hits = 0;
    let missWindow = 1200;
    let consecutiveMisses = 0;
    let timer = null;
    let missTimer = null;
    let paused = false;
    let gameActive = false;
    let totalTimer = null;
    let ended = false;
    
    function showCountdown() {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'countdown-overlay';
        document.body.appendChild(overlay);

        let count = 3;
        
        function updateCountdown() {
          overlay.innerHTML = `<div class="countdown-number">${count}</div>`;
          sound.click();
          
          if (count > 1) {
            count--;
            setTimeout(updateCountdown, 1000);
          } else {
            setTimeout(() => {
              overlay.innerHTML = '<div class="countdown-number" style="color: #7dd3fc;">GO!</div>';
              sound.success();
              setTimeout(() => {
                overlay.remove();
                resolve();
              }, 800);
            }, 1000);
          }
        }
        
        updateCountdown();
      });
    }
    
    function openGameWindow() {
      gameWindow.classList.add('active');
      document.getElementById('main-menu').style.display = 'none';
    }
    
    function closeGameWindow() {
      gameWindow.classList.remove('active');
      document.getElementById('main-menu').style.display = 'block';
      // Update main menu displays
      scoreEl.textContent = score;
      hitsEl.textContent = hits;
      intervalEl.textContent = missWindow;
    }

    function placeTarget() {
      const maxX = gameStage.clientWidth - 64;
      const maxY = gameStage.clientHeight - 64;
      gameTarget.style.left = Math.random() * maxX + 'px';
      gameTarget.style.top = Math.random() * maxY + 'px';
    }

    function syncModeUI() {
      const timed = modeEl.value === 'timed';
      timeRow.style.display = timed ? 'flex' : 'none';
      timeEl.textContent = timed ? timeLimitEl.value : '∞';
    }

    function startTotalTimer() {
      clearInterval(totalTimer);
      if (modeEl.value !== 'timed') {
        gameTimeEl.textContent = '∞';
        return;
      }
      let t = parseInt(timeLimitEl.value, 10);
      gameTimeEl.textContent = t;
      totalTimer = setInterval(() => {
        if (paused || ended) return;
        t -= 1;
        gameTimeEl.textContent = t;
        if (t <= 0) endGame('Time Up!');
      }, 1000);
    }

    function scheduleMiss() {
      clearTimeout(missTimer);
      missTimer = setTimeout(async () => {
        if (paused || !gameActive || ended) return;
        consecutiveMisses++;

        // Deduct 1 point per miss
        score = Math.max(0, score - 1);

        // Additional penalty every 5 consecutive misses: 2, 4, 6, ...
        if (consecutiveMisses % 5 === 0) {
          const penaltyTier = Math.floor(consecutiveMisses / 5);
          const additionalPenalty = penaltyTier * 2;
          score = Math.max(0, score - additionalPenalty);
          toast(`⚠️ Penalty: -${additionalPenalty} (miss streak ${consecutiveMisses})`, 'error');
        }

        updateScoreDisplay();
        await record(false);
        placeTarget();
        scheduleMiss();
      }, missWindow);
    }
    
    function updateScoreDisplay() {
      gameScoreEl.textContent = score;
    }
    
    function updateHitsDisplay() {
      gameHitsEl.textContent = hits;
    }
    
    function updateSpeedDisplay() {
      gameSpeedEl.textContent = missWindow + 'ms';
    }

    async function start() {
      // Load ML difficulty recommendation
      const mlRecommendation = await mlClient.getDifficultyRecommendation('focusSphere');
      if (mlRecommendation?.autoAdjust) {
        diffEl.value = mlRecommendation.suggestedDifficulty;
      }
      if (mlRecommendation) {
        mlClient.displayDifficultyWidget('difficulty-widget-focus', mlRecommendation);
      }

      // Show countdown
      await showCountdown();
      
      // Open game window
      openGameWindow();
      
      paused = false;
      gameActive = true;
      ended = false;
      score = 0; 
      hits = 0;
      consecutiveMisses = 0;
      // Longer response window for neurodivergent-friendly training
      missWindow = diffEl.value === 'advanced' ? 900 : diffEl.value === 'intermediate' ? 1200 : 1600;
      
      updateScoreDisplay();
      updateHitsDisplay();
      updateSpeedDisplay();
      
      sessionId = await startSession('focusSphere', diffEl.value);
      
      gameTarget.style.display = 'block';
      placeTarget();
      if (timer) clearInterval(timer);
      startTotalTimer();
      scheduleMiss();
    }

    async function record(hit) {
      const metric = { name: hit ? 'hit' : 'miss', value: hit ? 1 : 0, skill: 'attention', difficulty: diffEl.value };
      await recordMetrics(sessionId, [metric], false);
    }

    gameTarget.addEventListener('click', async () => {
      if (paused || !gameActive || ended) return;
      hits += 1;
      score += 10;
      consecutiveMisses = 0;  // Reset consecutive miss counter on successful hit
      missWindow = Math.max(400, missWindow - 20);
      gameTarget.classList.remove('hit-pop');
      // restart animation
      void gameTarget.offsetWidth;
      gameTarget.classList.add('hit-pop');
      sound.success();
      updateHitsDisplay();
      updateScoreDisplay();
      updateSpeedDisplay();
      placeTarget();
      scheduleMiss();
      await record(true);
    });

    gameStage.addEventListener('click', async (e) => {
      if (e.target === gameTarget || paused || !gameActive || ended) return;
      score = Math.max(0, score - 3);
      sound.error();
      updateScoreDisplay();
      await record(false);
      if (modeEl.value === 'elimination') endGame('Game Over - Missed!');
    });

    document.getElementById('start').addEventListener('click', start);
    
    document.getElementById('quit-game').addEventListener('click', async () => {
      if (confirm('Are you sure you want to quit? Your progress will be saved.')) {
        endGame('Player quit', true);
      }
    });

    window.addEventListener('beforeunload', () => { 
      if (sessionId) recordMetrics(sessionId, [{ name: 'score', value: score, skill: 'attention', difficulty: diffEl.value }], true); 
    });

    function endGame(message, immediate = false) {
      if (ended) return;
      ended = true;
      gameActive = false;
      clearInterval(timer);
      clearInterval(totalTimer);
      clearTimeout(missTimer);
      
      gameTarget.style.display = 'none';
      
      recordMetrics(sessionId, [{ name: 'score', value: score, skill: 'attention', difficulty: diffEl.value }], true);
      
      // Send session data to ML for analysis
      mlClient.analyzeSessionComplete({
        gameKey: 'focusSphere',
        duration: tracker.getTotalTime?.() || 0,
        score: score,
        metrics: [
          { name: 'score', value: score },
          { name: 'misses', value: misses },
          { name: 'difficulty', value: diffEl.value }
        ]
      });
      
      toast(`${message} Score: ${score}`, score > 100 ? 'success' : 'info');
      
      if (immediate) {
        closeGameWindow();
      } else {
        setTimeout(() => {
          closeGameWindow();
        }, 2000);
      }
    }

    modeEl.addEventListener('change', syncModeUI);
    timeLimitEl.addEventListener('change', syncModeUI);
    syncModeUI();
  </script>
</body>
</html>
